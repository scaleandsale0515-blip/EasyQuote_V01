name: easyquote
description: "EasyQuote — offline Quotation & Invoice manager for precast concrete factories."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local on-device database (Hive Community Edition — actively maintained fork,
  # the original hive/hive_flutter packages are abandoned, so we use this instead).
  hive_ce: ^2.3.0
  hive_ce_flutter: ^2.3.0

  # Hashing for the hidden admin lock (SHA-256)
  crypto: ^3.0.6

  # Real vector PDF generation (selectable text) + print/share/save flow
  pdf: ^3.11.3
  printing: ^5.13.4

  # Filesystem paths for storing the local Hive DB + PDF exports on-device
  path_provider: ^2.1.5

  # Dates, formatting
  intl: ^0.19.0

  # Pick logo / signature / stamp images from device
  image_picker: ^1.1.2

  # Share generated PDFs (WhatsApp/Email/etc.)
  share_plus: ^11.1.0

  # Dashboard bar charts
  fl_chart: ^0.69.2

  # Pick a backup JSON file to restore
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Generates all mipmap icon sizes + adaptive icon from a single source image
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - assets/fonts/NotoSans-Italic.ttf

# ---------------------------------------------------------------------------
# App icon config — run: flutter pub run flutter_launcher_icons
# Source icon is the EasyQuote "E" mark you supplied (assets/icon/app_icon.png)
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B0B0D"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
